<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalized Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="max-w-xl w-full bg-white rounded-2xl shadow-xl p-6 md:p-8 space-y-8">
        <header class="text-center">
            <h1 class="text-3xl font-extrabold text-indigo-600 tracking-tight">Welcome Dashboard</h1>
            <p class="text-gray-500 mt-1">Tell us a bit about yourself to get started.</p>
        </header>

        <section id="input-section">
            <form id="userForm" class="space-y-4">
                <div>
                    <label for="userName" class="block text-sm font-semibold text-gray-700 mb-1">Your Name</label>
                    <input type="text" id="userName" required autocomplete="name"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none transition">
                </div>
                <div>
                    <label for="userAge" class="block text-sm font-semibold text-gray-700 mb-1">Your Age (Years)</label>
                    <input type="number" id="userAge" min="1" max="120" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none transition">
                </div>
                <button type="submit" 
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 px-4 rounded-lg  shadow-md">
                    Save Profile
                </button>
            </form>
        </section>
        <main id="dashboard-section" class="hidden space-y-6 border-t border-gray-100 pt-6">
            
            <div class="bg-indigo-50 rounded-xl p-4 border border-indigo-100">
                <h2 id="greeting" class="text-xl font-bold text-indigo-900"></h2>
                <p id="ageInMonths" class="text-indigo-700 mt-1 font-medium"></p>
            </div>

            <div id="ageGateMessage" class="p-4 rounded-xl font-medium border"></div>

            <div>
                <h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-3">Daily Reminders</h3>
                <ul id="quoteList" class="space-y-2"></ul>
            </div>

            <button id="clearBtn" 
                class="w-full bg-gray-100 hover:bg-red-50 hover:text-red-600 text-gray-500 font-medium py-2 px-4 rounded-lg transition duration-200 text-sm">
                Reset Profile
            </button>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
